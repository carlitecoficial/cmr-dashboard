<style>
:root{--bg:#0e0e10;--bg2:#17171a;--bg3:#1f1f23;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#f0f0f0;--text2:#888;--text3:#555;--accent:#22c55e;--accent2:#5dcaa5;--danger:#e24b4a;--radius:12px;--radius-sm:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{padding:28px 32px 20px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;border-bottom:1px solid var(--border);margin-bottom:24px;}
.logo{display:flex;align-items:center;gap:14px;}
.logo-badge{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:13px;color:white;}
h1{font-size:18px;font-weight:500;letter-spacing:-0.3px;}
h1 span{color:var(--text2);font-weight:300;}
.badge{font-family:'DM Mono',monospace;font-size:11px;background:var(--bg3);border:1px solid var(--border2);padding:6px 12px;border-radius:20px;color:var(--text2);}
.month-scroll{overflow-x:auto;padding:0 32px 16px;scrollbar-width:none;}
.month-scroll::-webkit-scrollbar{display:none;}
.month-track{display:flex;gap:6px;min-width:max-content;}
.mbtn{font-family:'DM Mono',monospace;font-size:11px;padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.mbtn:hover{border-color:var(--accent);color:var(--accent);}
.mbtn.active{background:var(--accent);color:white;border-color:var(--accent);}
main{padding:0 32px 40px;}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;}
.metric-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
.metric-value{font-size:20px;font-weight:500;letter-spacing:-0.5px;}
.metric-sub{font-size:11px;color:var(--text3);margin-top:4px;}
.up{color:var(--danger);} .down{color:var(--accent2);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
.card-title{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:14px;}
.cat-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity 0.15s;}
.cat-row:last-child{border-bottom:none;}
.cat-row:hover{opacity:0.7;}
.cat-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.cat-name{font-size:12px;flex:1;}
.cat-bar-wrap{width:80px;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
.cat-bar{height:100%;border-radius:2px;transition:width 0.5s ease;}
.cat-amount{font-family:'DM Mono',monospace;font-size:11px;min-width:88px;text-align:right;}
.cat-pct{font-size:11px;color:var(--text3);min-width:28px;text-align:right;}
.tx-list{max-height:420px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.tx-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}
.tx-row:last-child{border-bottom:none;}
.tx-date{font-family:'DM Mono',monospace;color:var(--text3);min-width:44px;font-size:11px;}
.tx-desc{flex:1;}
.tx-pill{font-size:10px;padding:2px 8px;border-radius:10px;flex-shrink:0;}
.cat-select{font-size:10px;padding:2px 6px;border-radius:10px;flex-shrink:0;border:1px solid;background:transparent;cursor:pointer;outline:none;font-family:'Sora',sans-serif;}
.tx-amount{font-family:'DM Mono',monospace;font-weight:500;min-width:72px;text-align:right;}
.tx-filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.fcat-btn{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.15s;}
.pie-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.pie-legend span{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2);}
.pie-legend i{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.updated{font-size:11px;color:var(--text3);text-align:center;margin-top:28px;font-family:'DM Mono',monospace;}
@media(max-width:640px){header,main{padding-left:16px;padding-right:16px;}.month-scroll{padding-left:16px;}.grid2{grid-template-columns:1fr;}}
</style>

}
function reclassify(month,idx,newCat){
  ALL_DATA[month].transacciones[idx].categoria=newCat;
  try{localStorage.setItem('rc:'+month+':'+idx,newCat);}catch(e){}
  render(currentMonth);
}
function detectSubs(){
  const norm=s=>s.toLowerCase().replace(/[^a-z0-9à-ÿ]/g,' ').replace(/\s+/g,' ').trim();
  const map={};
  MONTHS.forEach(month=>{
    const seen=new Set();
    (ALL_DATA[month]?.transacciones||[]).filter(t=>t.categoria!=='Inversión').forEach(tx=>{
      const key=norm(tx.descripcion).slice(0,28);
      if(!seen.has(key)){seen.add(key);if(!map[key])map[key]={desc:tx.descripcion,cat:tx.categoria,months:[],amounts:[]};map[key].months.push(month);map[key].amounts.push(tx.monto);}});
  });
  return Object.values(map)
    .filter(s=>{
      if(s.months.length<4)return false;
      const avg=s.amounts.reduce((a,b)=>a+b,0)/s.amounts.length;
      const std=Math.sqrt(s.amounts.reduce((a,b)=>a+(b-avg)**2,0)/s.amounts.length);
      return (std/avg)<0.12;
    })
    .map(s=>{const avg=Math.round(s.amounts.reduce((a,b)=>a+b,0)/s.amounts.length);return {...s,avg,count:s.months.length};})
    .sort((a,b)=>b.avg-a.avg);
}
function renderSubs(){
  const subs=detectSubs();
  const totalFixed=subs.reduce((a,s)=>a+s.avg,0);
  const el=document.getElementById('subs-list');
  if(!subs.length){el.innerHTML='<div style="padding:12px;font-size:12px;color:var(--text3);">Sin suscripciones detectadas aún.</div>';return;}
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;padding:0 0 10px;border-bottom:1px solid var(--border);margin-bottom:4px;">
    <span style="font-size:11px;color:var(--text3);">${subs.length} cargos recurrentes detectados</span>
    <span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);">${fmt(totalFixed)}<span style="font-size:10px;color:var(--text3)">/mes promedio</span></span>
  </div>`+subs.map(s=>{
    const c=CATS[s.cat]||'#555';
    return `<div class="tx-row"><span class="tx-desc" style="font-size:12px">${s.desc}</span><span class="tx-pill" style="background:${c}22;color:${c}">${s.cat}</span><span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);min-width:50px;text-align:right">${s.count}m</span><span class="tx-amount" style="color:${c}">${fmt(s.avg)}</span></div>`;
  }).join('');
}
function toggleResumen(){
  const el=document.getElementById('resumen-total');
  const ch=document.getElementById('resumen-chevron');
  const open=el.style.display==='none';
  el.style.display=open?'block':'none';
  ch.style.transform=open?'rotate(90deg)':'rotate(0deg)';
  if(open&&!el.innerHTML)renderResumenTotal();
}
function renderResumenTotal(){
  const totals={};
  MONTHS.forEach(m=>{(ALL_DATA[m]?.transacciones||[]).forEach(tx=>{if(tx.categoria==='Inversión')return;totals[tx.categoria]=(totals[tx.categoria]||0)+tx.monto;});});
  const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const grand=Object.values(totals).reduce((a,b)=>a+b,0);
  const max=sorted[0]?sorted[0][1]:1;
  const lbl=document.getElementById('resumen-total-label');
  if(lbl)lbl.textContent='· '+fmt(grand)+' total';
  document.getElementById('resumen-total').innerHTML=sorted.filter(([,v])=>v>0).map(([cat,amt])=>{
    const pct=Math.round(amt/grand*100),c=CATS[cat]||'#555';
    return `<div class="cat-row"><span class="cat-dot" style="background:${c}"></span><span class="cat-name">${cat}</span><div class="cat-bar-wrap" style="width:100px"><div class="cat-bar" style="width:${Math.round(amt/max*100)}%;background:${c}"></div></div><span class="cat-amount">${fmt(amt)}</span><span class="cat-pct">${pct}%</span></div>`;
  }).join('');
}
let evolInst=null;
function renderEvolucion(){
  const labels=MONTHS;
  const valores=MONTHS.map(m=>Object.values(getCatTotals(m)).reduce((a,b)=>a+b,0));
  if(evolInst)evolInst.destroy();
  evolInst=new Chart(document.getElementById('evolChart'),{type:'line',data:{labels,datasets:[{data:valores,borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,0.07)',borderWidth:2,pointBackgroundColor:'#22c55e',pointRadius:4,tension:0.35,fill:true}]},options:{responsive:true,maintainAspectRatio:false,onClick:(e,els)=>{if(els.length)render(MONTHS[els[0].index]);},onHover:(e,els)=>{e.native.target.style.cursor=els.length?'pointer':'default';},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.raw)}}},scales:{x:{ticks:{color:'#555',font:{size:9,family:'DM Mono'}},grid:{display:false},border:{display:false}},y:{ticks:{color:'#555',font:{size:9,family:'DM Mono'},callback:v=>fmtK(v)},grid:{color:'rgba(255,255,255,0.04)'},border:{display:false}}}}});
}
const track=document.getElementById('month-track');
MONTHS.forEach(m=>{const btn=document.createElement('button');btn.className='mbtn';btn.dataset.m=m;btn.textContent=m;btn.onclick=()=>render(m);track.appendChild(btn);});
(function applyRc(){for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(!k||!k.startsWith('rc:'))continue;const p=k.split(':');if(p.length<3)continue;const m=p[1],idx=+p[2],tx=ALL_DATA[m]?.transacciones?.[idx];if(tx)tx.categoria=localStorage.getItem(k);}})();
if(MONTHS.length){render(MONTHS[MONTHS.length-1]);renderSubs();renderEvolucion();}
</script>
